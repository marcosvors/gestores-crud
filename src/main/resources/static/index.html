<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestores</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Gestores</h1>

    <div id="mensagem" class="mensagem hidden"></div>

    <section class="card">
      <h2 id="form-titulo">Novo Gestor</h2>
      <form id="form-gestor">
        <input type="hidden" id="gestor-id" />
        <div class="campo">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Nome completo" required />
        </div>
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="email@exemplo.com" required />
        </div>
        <div class="acoes-form">
          <button type="submit" class="btn btn-primario" id="btn-salvar">Salvar</button>
          <button type="button" class="btn btn-secundario hidden" id="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Lista de Gestores</h2>
      <div class="tabela-wrapper">
        <table id="tabela-gestores">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela">
            <tr id="linha-vazia">
              <td colspan="4" class="vazio">Nenhum gestor cadastrado.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
